site_name: Prisma AIRS SDK
site_url: https://cdot65.github.io/prisma-airs-sdk/
site_description: TypeScript SDK for Palo Alto Networks AI Runtime Security (AIRS)
repo_name: cdot65/prisma-airs-sdk
repo_url: https://github.com/cdot65/prisma-airs-sdk

theme:
  name: material
  logo: images/logo.svg
  favicon: images/logo.svg
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.tabs.link
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

extra_css:
  - css/custom.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.mark
  - pymdownx.critic
  - pymdownx.keys
  - attr_list
  - md_in_html
  - tables
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

exclude_docs: |
  superpowers/

plugins:
  - search
  - literate-nav:
      nav_file: SUMMARY.md
      implicit_index: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Configuration: getting-started/configuration.md
      - Environment Variables: getting-started/environment-variables.md
      - Quick Start: getting-started/quick-start.md
  - Guides:
      - Scanning: guides/scan-api.md
      - Management: guides/management-api.md
      - OAuth Lifecycle: guides/oauth-lifecycle.md
      - Model Security: guides/model-security-api.md
      - Red Teaming: guides/red-team-api.md
      - DLP:
          - Data Filtering Profiles: guides/dlp/data-filtering-profiles.md
          - Data Patterns: guides/dlp/data-patterns.md
          - Data Profiles: guides/dlp/data-profiles.md
          - Dictionaries: guides/dlp/dictionaries.md
      - Cookbook:
          - API Key Rotation: guides/cookbook/api-key-rotation.md
  - API Reference: reference/api/
  - Developer:
      - Error Handling: developer/error-handling.md
  - About:
      - Release Notes: about/release-notes.md
      - License: about/license.md
